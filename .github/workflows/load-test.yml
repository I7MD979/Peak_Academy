name: k6 Load Test
on:
  workflow_dispatch:
    inputs:
      target_vus:
        description: 'Peak VUs (browsing+login combined)'
        required: true
        default: '150'

jobs:
  load-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run k6 load test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: peak-load-test.js
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          K6_TARGET_VUS: ${{ github.event.inputs.target_vus }}
